name: Daily Holiday Check

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: pip install requests

      - name: Debug files and run bot
        run: |
          echo "=== FILE LIST ==="
          ls -la
          echo "=== FILE CONTENT ==="
          sed -n '1,200p' holiday_bot.py
          echo "=== PYTHON VERSION ==="
          python --version
          echo "=== RUNNING SCRIPT ==="
          python holiday_bot.py
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
