      - name: Run bot
        run: |
          echo "=== FILE LIST ==="
          ls -la
          echo "=== FILE CONTENT ==="
          sed -n '1,120p' holiday_bot.py
          echo "=== PYTHON VERSION ==="
          python --version
          echo "=== RUNNING SCRIPT ==="
          python holiday_bot.py
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
